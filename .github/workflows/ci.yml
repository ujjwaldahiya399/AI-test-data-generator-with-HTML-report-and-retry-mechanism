name: AI Test Data Generator CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Build Image
              run: docker build -t ai-test-data-generator .

            - name: login to DockerHub
              run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            - name: Push Image to DockerHub
              run: |
                    docker tag ai-test-data-generator dahiyaujjwal/ai-test-data-generator:latest
                    docker push dahiyaujjwal/ai-test-data-generator:latest